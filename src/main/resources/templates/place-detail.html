<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${place.name}">Detay</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:'DM Sans','Segoe UI',sans-serif;
    background: linear-gradient(180deg, #3d0d6b 0%, #1a0535 25%, #0d0220 60%, #060110 100%);
    min-height:100vh;
    color:white;
    padding:28px 40px 0;
}
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
}

.logo{
    font-family:'Syne',sans-serif;
    font-size:24px;
    font-weight:900;
    color:#c084fc;
    text-decoration:none;
}

.menu a{
    text-decoration:none;
    color:rgba(255,255,255,0.65);
    margin-left:20px;
    font-size:14px;
    font-weight:500;
    padding:7px 16px;
    border-radius:30px;
    transition:.25s;
}

.menu a:hover{
    color:white;
    background:rgba(255,255,255,0.08);
}

.card{
    max-width:900px;
    margin:auto;
}

.slider{
    position:relative;
    margin-bottom:24px;
    border-radius:20px;
    overflow:hidden;
}

.main-image{
    width:100%;
    height:420px;
    object-fit:cover;
    display:block;
    transition:.4s;
}

.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:rgba(124,58,237,0.75);
    color:white;
    font-size:20px;
    cursor:pointer;
    z-index:10;
    transition:.25s;
    backdrop-filter:blur(4px);
}

.arrow:hover{ background:#7c3aed; }
.left{ left:14px; }
.right{ right:14px; }

.dots{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:6px;
}

.dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(255,255,255,0.4);
    transition:.3s;
    cursor:pointer;
}

.dot.active{
    background:white;
    width:18px;
    border-radius:3px;
}

.place-title{
    font-family:'Syne',sans-serif;
    font-size:36px;
    font-weight:900;
    color:white;
    margin-bottom:6px;
}

.address-block{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:12px 16px;
    margin-bottom:16px;
}

.address-icon{
    width:38px;
    height:38px;
    background:rgba(192,132,252,0.18);
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
}

.address-text{
    color:rgba(255,255,255,0.55);
    font-size:13px;
    line-height:1.5;
}

.address-text b{
    color:white;
    display:block;
    font-size:14px;
    margin-bottom:1px;
}

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:14px;
}

.badge{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    color:rgba(255,255,255,0.7);
    font-size:13px;
    padding:6px 14px;
    border-radius:30px;
}

.badge.green{
    background:rgba(30,160,80,0.18);
    border-color:rgba(30,160,80,0.35);
    color:rgba(100,220,140,0.9);
}

.badge.red{
    background:rgba(200,50,50,0.18);
    border-color:rgba(200,50,50,0.35);
    color:rgba(255,140,140,0.9);
}

.moods{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-bottom:20px;
}

.mood-tag{
    background:rgba(180,100,220,0.2);
    border:1px solid rgba(180,100,220,0.3);
    color:rgba(220,160,255,0.9);
    font-size:12px;
    padding:5px 12px;
    border-radius:20px;
}

.description{
    background:rgba(255,255,255,0.04);
    border-left:3px solid #c084fc;
    border-radius:0 14px 14px 0;
    padding:18px 20px;
    color:rgba(255,255,255,0.7);
    line-height:1.8;
    font-size:14px;
    margin-bottom:28px;
}

.section-title{
    font-family:'Syne',sans-serif;
    font-size:20px;
    font-weight:700;
    color:white;
    margin-bottom:14px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.comment-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:14px 16px;
    margin-bottom:10px;
}

.comment-user{
    color:#c084fc;
    font-size:13px;
    font-weight:700;
    margin-bottom:5px;
}

.comment-text{
    color:rgba(255,255,255,0.65);
    font-size:13px;
    line-height:1.6;
}

.empty-comment{
    color:rgba(255,255,255,0.3);
    font-style:italic;
    margin-bottom:20px;
    font-size:14px;
}

.comment-form{
    background:rgba(192,132,252,0.07);
    border:1px solid rgba(192,132,252,0.15);
    border-radius:18px;
    padding:22px;
    margin-top:16px;
}

.comment-form h3{
    font-family:'Syne',sans-serif;
    font-size:18px;
    font-weight:700;
    color:white;
    margin-bottom:14px;
}

.comment-form input,
.comment-form textarea{
    width:100%;
    padding:12px 15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.12);
    font-size:14px;
    font-family:'DM Sans',sans-serif;
    margin-bottom:10px;
    background:rgba(255,255,255,0.06);
    color:white;
    transition:.25s;
    outline:none;
}

.comment-form input::placeholder,
.comment-form textarea::placeholder{
    color:rgba(255,255,255,0.35);
}

.comment-form input:focus,
.comment-form textarea:focus{
    border-color:rgba(192,132,252,0.5);
    background:rgba(255,255,255,0.09);
}

.comment-form textarea{
    height:100px;
    resize:vertical;
}

.submit-btn{
    background:linear-gradient(135deg, #7c3aed, #a855f7);
    color:white;
    border:none;
    padding:12px 26px;
    border-radius:12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    font-family:'DM Sans',sans-serif;
    transition:.25s;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 24px rgba(124,58,237,0.35);
}

.back-link{
    display:inline-block;
    margin-top:30px;
    color:#c084fc;
    font-weight:600;
    text-decoration:none;
    font-size:14px;
}.istanbul-footer{
    width:100%;
    height:280px;
    margin-top:80px;
    overflow:hidden;
    position:relative;
}

.istanbul-footer img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center bottom;
    display:block;
    opacity:0.85;
}

/* Üst kısmı sayfanın arka planına yedir */
.istanbul-footer::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        #060110 0%,
        rgba(6,1,16,0.4) 25%,
        transparent 50%
    );
    z-index:2;
}

/* Alt kısmı da yumuşat */
.istanbul-footer::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        #060110 0%,
        rgba(6,1,16,0.8) 10%,
        transparent 30%
    );
    z-index:2;
}.istanbul-footer img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center bottom;
    display:block;
    opacity:0.75;
    filter:saturate(1.1) brightness(0.8);
}.istanbul-footer{
    margin-top:0;
}
.back-link:hover{ text-decoration:underline; }
</style>
</head>
<body>

<div class="navbar">
    <a class="logo" href="/moods">Modum 🌙</a>
    <div class="menu">
        <a href="/moods">Ana Sayfa</a>
        <a href="/about">Hakkımızda</a>
    </div>
</div>

<div class="card">

    <div class="slider">
        <button class="arrow left" onclick="prevPhoto()">❮</button>
        <img id="mainPhoto" class="main-image"
             th:src="@{${place.imageUrl}}"
             alt="Mekan Fotoğrafı">
        <button class="arrow right" onclick="nextPhoto()">❯</button>
        <div class="dots" id="dotsContainer"></div>
    </div>



    
    <div class="place-title" th:text="${place.name}"></div>

    <div class="address-block">
        <div class="address-icon">📍</div>
        <div class="address-text">
            <b th:text="${place.district}"></b>
            <span th:text="${place.address}"></span>
        </div>
    </div>

    <!-- Çalışma Saatleri + Haritada Gör -->
<div class="address-block" style="margin-bottom:12px; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:10px;">
        <div class="address-icon">🕐</div>
        <div class="address-text">
            <b>Çalışma Saatleri</b>
            <span th:text="${place.openingTime} + ' – ' + ${place.closingTime}"></span>
        </div>
    </div>
    <a 
       th:href="'https://www.google.com/maps/search/?api=1&query=' + ${place.name} + '+' + ${place.district} + '+Istanbul'"
       target="_blank"
       style="background:rgba(192,132,252,0.15); border:1px solid rgba(192,132,252,0.3);
              color:#c084fc; padding:8px 16px; border-radius:30px; font-size:13px;
              font-weight:600; text-decoration:none; white-space:nowrap;
              transition:.25s; display:flex; align-items:center; gap:6px;">
        🗺️ Haritada Gör
    </a>
</div>
    <div class="badges">
        <span class="badge">⭐ <span th:text="${place.rating}"></span> / 5.0</span>
        <span th:class="${place.wifi ? 'badge green' : 'badge red'}">
            📶 WiFi: <span th:text="${place.wifi ? 'Var' : 'Yok'}"></span>
        </span>
        <span th:class="${place.socket ? 'badge green' : 'badge red'}">
            🔌 Priz: <span th:text="${place.socket ? 'Var' : 'Yok'}"></span>
        </span>
        <span th:if="${place.priceRange != null}" class="badge">
    💰 <span th:text="${place.priceRange}"></span>
</span>
    </div>

    <div class="moods">
        <span class="mood-tag" th:each="mood : ${place.moods}">
            <span th:text="${mood.icon}"></span>
            <span th:text="${mood.name}"></span>
        </span>
    </div>

    <div class="description" th:text="${place.description}"></div>

    <div class="section-title">💬 Yorumlar</div>

    <div th:if="${#lists.isEmpty(comments)}" class="empty-comment">
        Henüz yorum yapılmamış. İlk yorumu sen yap!
    </div>

    <div th:each="comment : ${comments}" class="comment-box">
        <div class="comment-user">👤 <span th:text="${comment.username}"></span></div>
        <div class="comment-text" th:text="${comment.content}"></div>
    </div>

    <div class="comment-form">
        <h3>✍️ Yorum Yap</h3>
        <form th:action="@{/place/{id}/comment(id=${place.id})}" method="post">
            <input type="text" name="username" placeholder="Adınız" required>
            <textarea name="content" placeholder="Yorumunuzu yazın..." required></textarea>
            <button type="submit" class="submit-btn">Gönder →</button>
        </form>
    </div>

    <a class="back-link" href="javascript:history.back()">← Geri Dön</a>

</div>

<script>
const placeImageUrl = /*[[${place.imageUrl}]]*/ '/images/placeholder.jpg';

const photos = [placeImageUrl];
let currentIndex = 0;

function buildDots() {
    const container = document.getElementById('dotsContainer');
    container.innerHTML = '';
    photos.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot' + (i === currentIndex ? ' active' : '');
        d.onclick = () => { currentIndex = i; showPhoto(); };
        container.appendChild(d);
    });
}

function showPhoto() {
    document.getElementById('mainPhoto').src = photos[currentIndex];
    buildDots();
}

function nextPhoto() {
    currentIndex = (currentIndex + 1) % photos.length;
    showPhoto();
}

function prevPhoto() {
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    showPhoto();
}

buildDots();
</script>
<div style="width:100%; height:250px; position:relative; overflow:hidden; margin-top:40px;">
    <div style="position:absolute; inset:0; background:linear-gradient(to bottom, #0d0220 0%, transparent 40%); z-index:2;"></div>
    <div style="position:absolute; inset:0; background:linear-gradient(to top, #060110 0%, transparent 30%); z-index:2;"></div>
    <div style="position:absolute; left:0; right:0; bottom:0; height:60px; background:linear-gradient(to top, #060110, transparent); z-index:3;"></div>
    <img th:src="@{/images/ist.png}" style="width:100%; height:100%; object-fit:cover; object-position:center bottom; opacity:0.9; display:block;">
</div>
</body>
</html>
